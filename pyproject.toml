[build-system]
requires = ["setuptools", "cython>=3.0.11,<4"]

build-backend = "setuptools.build_meta"

[tool.cibuildwheel]
skip = "cp38-* cp39-* pp38-* pp39-*"

[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
env_files = ["test.env"]
asyncio_default_fixture_loop_scope = "session"
addopts = "-n 4"
