[build-system]
requires = ["setuptools", "cython>=3.0.11,<4"]

build-backend = "setuptools.build_meta"

[tool.cibuildwheel]
skip = "cp38-* cp39-* pp38-* pp39-*"

[tool.ruff]
target-version = "py310"
line-length = 140
force-exclude = true
extend-exclude = ["clickhouse_connect/driverc"]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "UP",
    "B",
    "N",
]
ignore = [
    "E501",
    "B905",
]

[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
env_files = ["test.env"]
asyncio_default_fixture_loop_scope = "session"
addopts = "-n 4"
